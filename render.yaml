services:
  - type: web
    name: react-flow-server
    runtime: node
    plan: free
    rootDir: .
    buildCommand: pnpm install && pnpm --filter @react-flow/server exec npx prisma generate && pnpm --filter @react-flow/server build
    startCommand: pnpm --filter @react-flow/server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
